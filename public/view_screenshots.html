<!DOCTYPE html>
<html lang="en">
<head>

  <title>Zivora Mobile UI Screenshots</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      margin: 20px;
    }
    h1 {
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }
    .screen {
      border: 2px solid #555;
      border-radius: 8px;
      padding: 10px;
      background: #222;
      max-width: 500px;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .label {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <h1>Zivora Mobile UI Designer Screenshots</h1>
  <div class="container">

    </div>
    <div class="screen">
      <div class="label">Screenshot 2 (media__1782200534889.png)</div>
